  <body>
    <!--
      Anti-flicker theme script — runs synchronously BEFORE any paint.
      Reads the Zustand-persisted key from localStorage and stamps the
      'dark' class onto <html> immediately so there is zero FOUC
      regardless of how slow the JS bundle loads.
      Must stay inline and before <div id="root">.
    -->
    <script>
      (function () {
        var STORAGE_KEY = 'safetymeg-theme';
        var stored = null;
        try {
          var raw = localStorage.getItem(STORAGE_KEY);
          if (raw) stored = JSON.parse(raw).state && JSON.parse(raw).state.theme;
        } catch (_) {}
        var theme = stored || 'dark'; // default matches store default
        if (
          theme === 'dark' ||
          (theme === 'system' &&
            window.matchMedia('(prefers-color-scheme: dark)').matches)
        ) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
